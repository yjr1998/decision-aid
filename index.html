<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>冠心病介入治疗决策辅助工具 V2.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{--c1:#3B6B4F;--c1d:#2D5240;--c1l:#5A9E73;--bg:#F7F5EF;--bgs:#E8EFE3;--tx:#2D3B2A;--txs:#5D7058;--bd:#C8D8C2;--warn:#C4805A;--acc:#8B7355;--red:#C25B5B}
    body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-tap-highlight-color:transparent;color:var(--tx);font-size:16px;-webkit-font-smoothing:antialiased;line-height:1.75}
    *{box-sizing:border-box;margin:0;padding:0}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
    .aIn{animation:fadeIn .35s ease-out}.aSl{animation:slideUp .35s ease-out}
    .tbl{width:100%;border-collapse:collapse;font-size:14px;margin:8px 0;border:1px solid var(--bd);background:#fff;border-radius:10px;overflow:hidden}
    .tbl th{background:var(--c1);color:#fff;padding:10px 8px;border:1px solid rgba(255,255,255,.15);font-weight:600;text-align:center;font-size:13px;line-height:1.5}
    .tbl td{padding:10px 8px;border:1px solid var(--bd);vertical-align:top;line-height:1.5;font-size:14px}.tbl tr:nth-child(even) td{background:var(--bgs)}
    .pi{display:inline-block;width:14px;height:22px;margin:1px;position:relative}
    .pi::before{content:'';display:block;width:7px;height:7px;border-radius:50%;margin:0 auto 1px}
    .pi::after{content:'';display:block;width:10px;height:10px;border-radius:3px 3px 2px 2px;margin:0 auto}
    .pi.on::before,.pi.on::after{background:var(--c1)}.pi.w::before,.pi.w::after{background:var(--warn)}.pi.off::before,.pi.off::after{background:#DDD}
    .slider{-webkit-appearance:none;width:100%;height:8px;border-radius:4px;background:linear-gradient(to right,var(--c1l),#e8e4d9);outline:none;margin:8px 0}
    .slider::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:var(--c1);cursor:pointer;border:3px solid #fff;box-shadow:0 2px 8px rgba(59,107,79,.3)}
    .card{background:#fff;padding:18px;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.05);border:1px solid var(--bd);margin-bottom:14px}
    .tf{transition:all .15s ease}.tf:active{transform:scale(.97);opacity:.85}
    details summary{cursor:pointer;list-style:none}details summary::-webkit-details-marker{display:none}
    .fn{font-size:11px;font-style:italic;color:#999;margin-top:4px;line-height:1.4}
  </style>
</head>

<script type="text/babel">

const P={COVER:0,NEED:10,K1:20,EPI:202,EPI2:203,K2:21,K3:22,MED:30,PCI:31,PCI2:310,PCI3:315,DEVS:311,DEVS2:312,DEVS3:313,CABG:32,CABG2:321,CABG3:322,EVID:33,POST:34,CMP:35,PREF:60,OUTCOME:70,REHAB:83,REHAB2:84,DIR:85,APPEND:90,END:99};
const getStep=(pg)=>{if(pg===P.COVER)return -1;if(pg===P.NEED)return 0;if(pg>=20&&pg<=59||pg===201||pg===202||pg===203||pg===310||pg===315||pg===321||pg===322||pg===312||pg===313)return 1;if(pg>=60&&pg<=70)return 2;return -1};
const stepLabels=['决策需求','决策支持','决策结局'];

// UI 基础组件
const Btn=({children,onClick,cls="",primary,...r})=>{const b=primary?'bg-[#3B6B4F] text-white shadow-md':'bg-white border-2 border-[#3B6B4F] text-[#3B6B4F]';return<button type="button" onClick={onClick} className={`tf rounded-xl font-bold text-[15px] px-4 py-3 ${b} ${cls}`} {...r}>{children}</button>};
const Chev=({d="r",c="#3B6B4F",s=18})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d={d==='l'?"M15 18l-6-6 6-6":d==='d'?"M6 9l6 6 6-6":"M9 18l6-6-6-6"}/></svg>;
const StepBar=({current})=>(<div className="sticky top-0 z-50 bg-[#F7F5EF]/95 backdrop-blur-sm border-b border-[#C8D8C2] px-4 py-2 shadow-sm"><div className="flex items-center justify-center gap-1 max-w-[280px] mx-auto">{stepLabels.map((name,i)=>(<React.Fragment key={i}>{i>0&&<div className={`h-[2px] flex-1 ${i<=current?'bg-[#3B6B4F]':'bg-[#DDD]'}`}/>}<div className="flex flex-col items-center" style={{minWidth:50}}><div className={`w-[10px] h-[10px] rounded-full ${i<current?'bg-[#3B6B4F]':i===current?'bg-[#3B6B4F] ring-4 ring-[#3B6B4F]/20':'bg-[#DDD]'}`}/><span className={`text-[10px] mt-1 font-bold whitespace-nowrap ${i<=current?'text-[#3B6B4F]':'text-[#AAA]'}`}>{name}</span></div></React.Fragment>))}</div></div>);
const Nav=({title,onBack,step,sub,onDir})=>(<div className="bg-[#F7F5EF]">{step>=0&&<StepBar current={step}/>}<div className="flex items-center gap-2 px-4 py-2 border-b border-[#C8D8C2]/50">{onBack&&<button onClick={onBack} className="tf p-1 -ml-1 text-[#3B6B4F] rounded-full"><Chev d="l" s={20}/></button>}<div className="min-w-0 flex-1"><p className="font-bold text-[#2D3B2A] text-[15px] truncate">{title}</p>{sub&&<p className="text-[11px] text-[#3B6B4F]">{sub}</p>}</div>{onDir&&<button onClick={onDir} className="tf px-2.5 py-1 text-[#3B6B4F] rounded-lg text-[13px] font-bold border border-[#C8D8C2]">目录</button>}</div></div>);
const Dots=({n,c})=>(<div className="flex justify-center gap-[6px] py-1.5">{[...Array(n)].map((_,i)=><div key={i} style={{width:i===c?20:8,height:8,borderRadius:4,background:i===c?'#3B6B4F':'#DDD',transition:'.3s'}}/>)}</div>);
const Sec=({title,children,accent,warn})=>(<div className={`card aIn ${accent?'border-l-4 border-[#3B6B4F]':warn?'border-l-4 border-[#C4805A]':''}`}>{title&&<h3 className="font-bold text-[#2D3B2A] mb-2 text-[16px]">{title}</h3>}<div className="text-[15px] text-[#2D3B2A] leading-relaxed space-y-2">{children}</div></div>);
const QA=({q,a})=>(<details className="border border-gray-200 rounded-lg overflow-hidden mb-2"><summary className="flex items-center justify-between p-3 bg-[#FAFAF8]"><span className="font-bold text-[15px] pr-2">{q}</span><span className="text-[#3B6B4F] text-lg">+</span></summary><div className="p-3 text-[15px] text-gray-600 bg-white border-t border-gray-100">{a}</div></details>);
const People=({total=100,n=0,color="on",label,note})=>(<div className="mb-2"><div className="flex justify-between text-[15px] mb-1 font-bold"><span>{label}</span><span>{n}/{total}</span></div>{note&&<p className="text-[13px] text-gray-500 mb-1">{note}</p>}<div className="flex flex-wrap gap-[1px]">{[...Array(total)].map((_,i)=><div key={i} className={`pi ${i<n?color:'off'}`}/>)}</div></div>);
const NBtn=({onClick,text="下一步",cls=""})=>(<Btn onClick={onClick} primary cls={`w-full py-3.5 text-base mt-4 ${cls}`}>{text} {text.includes('→') ? '' : '→'}</Btn>);

// 新增提炼的高频组件：单选框
const RadioItem = ({ checked, onChange, text, rightEl, activeCls="border-[#3B6B4F] bg-[#E8EFE3]" }) => (
  <label className={`flex items-center gap-3 text-[15px] p-2.5 rounded-lg border-2 cursor-pointer ${checked ? activeCls : 'border-gray-200'}`}>
    <input type="radio" className="w-4 h-4 accent-[#3B6B4F]" checked={checked} onChange={onChange}/>
    {text}
    {rightEl}
  </label>
);

// 新增提炼的高频组件：带Nav、Dots和下一步按钮的统一页面容器
const PageLayout = ({ go, title, sub, step, dots, onBack, onDir, next, nextText="下一步", children }) => (
  <div className="min-h-screen bg-[#F7F5EF]">
    <Nav title={title} sub={sub} step={step} onBack={onBack} onDir={onDir || (go ? () => go(P.DIR) : undefined)} />
    {dots && <Dots n={dots[0]} c={dots[1]} />}
    <div className="p-4 space-y-4">
      {children}
      {next && <NBtn onClick={typeof next === 'function' ? next : () => go(next)} text={nextText} />}
    </div>
  </div>
);

const DragRank=({items})=>{const[order,setOrder]=React.useState(items);const moveItem=(from,to)=>{if(to<0||to>=order.length)return;const n=[...order];const[m]=n.splice(from,1);n.splice(to,0,m);setOrder(n)};return(<div className="space-y-1.5">{order.map((item,i)=>(<div key={item} className="flex items-center gap-2 p-2.5 rounded-lg border-2 select-none border-gray-200 bg-[#FAFAF8]"><span className="w-6 h-6 rounded-full bg-[#3B6B4F] text-white text-[13px] font-bold flex items-center justify-center flex-shrink-0">{i+1}</span><span className="flex-1 text-[15px]">{item}</span><div className="flex flex-col gap-0.5"><button onClick={()=>moveItem(i,i-1)} className="text-[#3B6B4F] text-xs px-1 leading-none">▲</button><button onClick={()=>moveItem(i,i+1)} className="text-[#3B6B4F] text-xs px-1 leading-none">▼</button></div></div>))}</div>)};
const genSummary=(dec)=>{const now=new Date();const ds=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';return '冠心病 — 我的决策记录\n日期：'+ds+'\n\n决策类型：药物治疗、介入治疗（PCI）还是搭桥手术（CABG）\n\n我目前的想法：'+dec+'\n\n提醒：最终方案由我和医生、家人共同决定。\n——请把这份记录带给医生——'};
const ShareBtn=({dec})=>{if(!dec||dec==='ask')return null;return(<div className="card border-2 border-dashed border-[#3B6B4F] bg-[#E8EFE3] aSl"><p className="text-[15px] font-bold text-[#2D3B2A] mb-1">📋 把记录带给医生和家人</p><div className="flex gap-3"><Btn onClick={()=>{const t=genSummary(dec);if(navigator.share)navigator.share({title:'我的决策记录',text:t}).catch(()=>{});else navigator.clipboard.writeText(t).then(()=>alert('已复制')).catch(()=>{})}} primary cls="flex-1 py-3">📤 分享</Btn><Btn onClick={()=>{const t=genSummary(dec);const b=new Blob([t],{type:'text/plain;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='决策记录.txt';a.click()}} cls="flex-1 py-3">💾 保存</Btn></div></div>)};

const Med=({go})=>(<PageLayout go={go} title="方案一：药物治疗" sub="决策支持" step={1} onBack={()=>go(P.K3)} next={P.PCI} nextText="了解介入治疗（PCI）">

    <p>不做手术，通过<strong>长期规范服药</strong>来控制冠心病的进展和症状。药物治疗本身就是积极的治疗方案，不是"放弃治疗"。</p>

    <p>医生会将一根细而柔软的管子（称为导管）插入血管，通常从手腕或腹股沟处进入。导管会被引导至阻塞的心脏动脉处。导管末端有一个微型球囊。医生通过充气使球囊膨胀，从而扩张动脉。通常会植入一种称为支架的小型金属网状管，以保持动脉畅通，恢复血流。</p>
    <img src={window._I8} alt="冠状动脉球囊和支架" className="w-full rounded-lg mt-3"/>
    <p className="text-[12px] text-[#999] mt-1">放置冠状动脉支架时，将气球充气于导管尖端以扩张阻塞的动脉(A)。然后放置金属网状支架(B)。支架帮助保持动脉畅通，使血液能够通过它(C)。</p>
  </Sec>
</PageLayout>);

const Pci2=({go})=>(<PageLayout go={go} title="介入流程" sub="2/3" step={1} onBack={()=>go(P.PCI)} next={P.PCI3} nextText="风险与获益">
  <Sec title="介入流程通常怎么走？" accent>
    <div className="bg-[#FFF9E6] p-3 rounded-xl border border-[#D4A574] text-[14px] text-[#8B6B4A] mb-3">介入治疗的核心，不是"见窄就放支架"，而是先判断这段狭窄是否真的影响供血，再选择合适的处理方式。</div>
    <div className="card border-l-4 border-[#4A7A9B]">
      <p className="font-bold text-[#4A7A9B] text-[15px]">先看清病变：冠脉造影（CAG）</p>
      <p className="text-[14px] mt-1">先看哪根血管有问题、狭窄在什么位置、看起来有多严重。</p>
    </div>
    <div className="flex justify-center py-2"><span className="text-[#5D7058] text-lg">↓</span></div>
    <div className="flex gap-2">
      <div className="flex-1 card border border-[#C8D8C2]">
        <p className="font-bold text-[#4A7A9B] text-[14px]">血流功能评估（FFR/QFR）</p>
        <p className="text-[13px] mt-2">判断这段狭窄是否真的影响供血，帮助决定该不该处理。</p>
      </div>
      <div className="flex-1 card border border-[#C8D8C2]">
        <p className="font-bold text-[#4A7A9B] text-[14px]">血管内影像（IVUS/OCT）</p>
        <p className="text-[13px] mt-2">从血管里面再看一遍，帮助判断大小、长度和斑块特点。</p>
      </div>
    </div>
    <div className="flex justify-center py-2"><span className="text-[#5D7058] text-lg">↓</span></div>
    <div className="card border-l-4 border-[#3B6B4F]">
      <p className="font-bold text-[#3B6B4F] text-[15px]">如果确定需要处理</p>
      <p className="text-[14px] mt-1">常见方式包括<strong>经皮冠状动脉介入治疗（PCI）/ 经皮冠状动脉球囊扩张术（PTCA）</strong>，也就是球囊扩张、药物球囊、支架植入等处理方式。</p>
      <p className="text-[14px] mt-2">病变比较复杂时，还可能用到<strong>准分子激光、旋磨、血管内冲击波</strong>等技术帮助把血管处理得更合适。</p>
    </div>
  </Sec>
  <Sec title="这些辅助检查是不是每个人都要做？">
    <div className="bg-[#FAFAF8] p-3 rounded-lg border border-[#E8E4D9] mb-3 text-[14px]">不一定。下面这些检查更多是<strong>按情况选择</strong>：当医生拿不准这段狭窄是否真的需要处理，或者希望把病变看得更清楚时，才会建议加做。</div>
    <QA q="医生说要做FFR/QFR，有必要吗？" a={<div><p>造影看的是血管<strong>窄了多少</strong>，但看不出血流<strong>够不够用</strong>。好比水管看着窄了，但水流可能还够用。</p><p className="mt-1"><strong>FFR/QFR</strong>专门测血流够不够用。一种用导丝直接测量（有创），另一种通过造影影像用计算机分析算出（无创）。</p><p className="mt-1"><strong>关键指标：</strong>≤0.80说明血流不足，可能需要处理；&gt;0.80血流尚可，可先药物观察。</p><p className="mt-1 text-[13px] text-gray-500">FAVOR III China（Lancet 2021）：血流评估指导治疗，1年心脏事件风险降低约1/3。</p><p className="mt-1 text-[13px] text-gray-500">注：另一种血流评估方法（iFR）近期有研究提示其远期安全性可能不及FFR，目前仍有争议，请与医生讨论适合您的评估方式。</p></div>}/>
    <QA q="医生说要做IVUS/OCT，有必要吗？" a={<div><p>腔内影像包括<strong>血管内超声（IVUS）</strong>和<strong>光学相干断层扫描（OCT）</strong>，从血管内部看清斑块形态和管腔真实大小。比造影看得更清楚、更准确。</p><p className="mt-1"><strong>主要用途：</strong>①帮助判断要不要处理 ②指导手术怎么做最好 ③术后检查效果</p><p className="mt-1">⚡ 做腔内影像不一定要放支架，可能可以帮您<strong>避免不必要的支架</strong>。</p><p className="mt-1 text-[13px] text-gray-500">RENOVATE-COMPLEX-PCI（NEJM 2023）：腔内影像指导复杂病变手术，再出问题风险降低约1/3。</p></div>}/>
  </Sec>
</PageLayout>);

const Pci3=({go})=>(<PageLayout go={go} title="介入：风险与获益" sub="3/3" step={1} onBack={()=>go(P.PCI2)} next={P.DEVS} nextText="查看球囊与支架">
  <Sec title="风险与获益">
    <div className="bg-[#E8EFE3] p-3 rounded-lg"><p className="font-bold text-[#3B6B4F] mb-1">✅ 获益</p><p>• 创伤小，不开胸，多数从手腕穿刺，住院1-2天</p><p>• 症状缓解较快（多数术后即刻改善）</p><p>• 技术成熟，手术时间较短，多数1-2小时完成</p><p>• 恢复快，约1-2周可回归日常生活</p></div>
    <div className="bg-[#FFF5ED] p-3 rounded-lg mt-2"><p className="font-bold text-[#C4805A] mb-1">⚠️ 风险与不足</p><p>• 术后需服用双联抗血小板药6-12个月，出血风险略增</p><p>• 约3-5%患者可能出现支架内再狭窄；老一代非药物洗脱支架或特殊病变（如长病变、小血管、糖尿病等）再狭窄率可能更高</p><p>• 对于大多数中度缺血的稳定患者，介入的长期总生存率与单纯药物治疗无明显差别；但三支病变等特定情况下可能有获益</p></div>
  </Sec>
</PageLayout>);

const Devs=({go})=>(<PageLayout go={go} title="球囊治疗" sub="1/3" step={1} onBack={()=>go(P.PCI3)} next={P.DEVS2} nextText="了解支架">
  <Sec title="🎈 药物涂层球囊（DCB）— 特定情况下的选择" accent>
    <p>带药物的球囊充气撑开血管，药物涂布在血管内壁，然后球囊取出。<strong>术后血管内无永久植入物。</strong></p>
    <div className="bg-[#FFF9E6] p-2.5 rounded-lg border border-[#D4A574] text-[14px] text-[#8B6B4A] mt-2"><strong>⚠️ 重要提示：</strong>药物球囊<strong>不是</strong>常规支架的替代方案。最新研究（REC-CAGEFREE I 3年随访）显示，对于一般新发病变，球囊的器械相关问题发生率高于支架（约8.2%比5.0%）。药物球囊主要适用于以下<strong>特定情况</strong>。</div>
    <div className="bg-[#E8EFE3] p-3 rounded-lg mt-2"><p className="font-bold text-[#3B6B4F] mb-1">✅ 适用情况与优势</p><p>• <strong>支架内再狭窄</strong>（指南首选）</p><p>• <strong>细小血管</strong>（直径小于3毫米）：效果与支架相当</p><p>• <strong>高出血风险</strong>患者：双联抗血小板药时间短（约1-3个月）</p><p>• 不在体内留金属，保留血管原始结构</p></div>
    <div className="bg-[#FFF5ED] p-3 rounded-lg mt-2"><p className="font-bold text-[#C4805A] mb-1">⚠️ 局限</p><p>• 约10-12%术中需改放支架</p><p>• 术后短期可能血管暂时性缩回变窄</p></div>
    <p className="fn">REC-CAGEFREE I（Lancet 2024; JACC 2026 3年随访）· BASKET-SMALL 2（Lancet 2018/2021）</p>
  </Sec>
</PageLayout>);

const Devs2=({go})=>(<PageLayout go={go} title="支架治疗" sub="2/3" step={1} onBack={()=>go(P.DEVS)} next={P.DEVS3} nextText="费用参考">
  <Sec title="🔧 药物洗脱支架（DES）">
    <p>金属网状支架撑开血管，表面涂有防止再次变窄的药物。<strong>术后有永久金属植入物。</strong></p>
    <div className="bg-[#E8EFE3] p-3 rounded-lg mt-2"><p className="font-bold text-[#3B6B4F] mb-1">✅ 优势</p><p>• 支撑效果确切，技术最成熟，长期数据最充分</p><p>• 集采后价格大幅下降</p></div>
    <div className="bg-[#FFF5ED] p-3 rounded-lg mt-2"><p className="font-bold text-[#C4805A] mb-1">⚠️ 局限</p><p>• 金属永久留体内</p><p>• 需双联抗血小板药6-12个月，绝不可擅自停药</p><p>• 极少数可能发生支架内血栓</p></div>
  </Sec>
  <Sec title="💡 小结"><div className="bg-white p-3 rounded-lg border border-[#C8D8C2] text-[14px]"><p>术中如发现血管情况与预期不同，医生可能调整方案，但会尽量尊重您的意愿。</p></div></Sec>
</PageLayout>);

const Devs3=({go})=>(<PageLayout go={go} title="介入费用参考" sub="3/3" step={1} onBack={()=>go(P.DEVS2)} next={P.CABG} nextText="了解搭桥手术">

const Cabg=({go})=>(<PageLayout go={go} title="方案三：搭桥手术" sub="1/3" step={1} onBack={()=>go(P.DEVS3)} next={P.CABG2} nextText="证据与费用">
  <div className="bg-[#F5EDE8] p-3 rounded-lg text-[15px] font-bold text-center">🫀 方案三：搭桥手术（CABG）</div>
  <Sec title="具体是什么？" accent>
    <p>如果心绞痛影响到部分主要心脏动脉，且放支架等治疗效果不理想，可能需要<strong>心脏搭桥手术</strong>。</p>
    <p className="mt-2">全称"冠状动脉旁路移植术（CABG）"。医生取身体其他部位的血管（通常是胸部的乳内动脉或腿部的大隐静脉），"搭"一条新的通路绕过堵塞段，恢复心肌供血。需要开胸或胸部小切口</p>
    <img src={window._I10} alt="冠状动脉搭桥手术" className="w-full rounded-lg mt-2"/>
    <p className="text-[12px] text-[#999] mt-1">冠状动脉搭桥手术示意图。蓝色血管（Saphenous vein bypass）：取自腿部的大隐静脉桥；红色血管（Left internal mammary artery bypass）：左侧内乳动脉桥；Blockage in coronary artery：冠状动脉堵塞处。手术为血液流向心脏开辟新的通道，绕过堵塞部位。</p>
  </Sec>
  <Sec title="风险与获益">
    <div className="bg-[#E8EFE3] p-3 rounded-lg"><p className="font-bold text-[#3B6B4F] mb-1">✅ 获益</p><p>• 可一次处理多根血管（用自体血管绕过狭窄段）</p><p>• 三支病变+糖尿病时，搭桥的长期生存率明显优于介入</p><p>• 心功能下降（射血分数偏低）时，搭桥可能改善长期生存，而介入未显示此获益</p><p>• 乳内动脉桥10年通畅率约85-95%</p><p>• 再次手术率低于介入（5年约10% vs 16-17%）</p></div>
    <div className="bg-[#FFF5ED] p-3 rounded-lg mt-2"><p className="font-bold text-[#C4805A] mb-1">⚠️ 风险与不足</p><p>• 开胸手术，全身麻醉，恢复期约2-3个月</p><p>• 术后30天中风风险较介入高（约1.1%比0.4%）</p><p>• 术后需在重症监护室观察1-2天，胸骨愈合约6-8周</p><p>• 静脉桥远期可能退化变窄</p></div>
  </Sec>
</PageLayout>);

const Cabg2=({go})=>(<PageLayout go={go} title="搭桥：证据与费用" sub="2/3" step={1} onBack={()=>go(P.CABG)} next={P.CABG3} nextText="心脏团队与共同决策">
  <Sec title="什么是'血管复杂程度评分'？">
    <p className="text-[14px]">医生会根据<strong>冠脉造影</strong>的结果，对血管病变的复杂程度进行评分。这个评分会影响<strong>介入和搭桥哪个更适合您</strong>。</p>
    <div className="space-y-2 mt-2">
      <div className="bg-[#E8EFE3] p-2.5 rounded-lg border border-[#C8D8C2] text-[14px]"><strong>评分较低</strong>（病变相对简单）→ 应<strong>优先考虑最佳药物治疗</strong>；若药物无法控制症状需要血运重建，介入和搭桥效果差不多</div>
      <div className="bg-[#FFF9E6] p-2.5 rounded-lg border border-[#D4A574] text-[14px]"><strong>评分中等</strong> → 应<strong>慎重考虑</strong>是否需要血运重建，建议与心脏团队详细讨论后决定</div>
      <div className="bg-[#FFF5ED] p-2.5 rounded-lg border border-[#C4805A]/30 text-[14px]"><strong>评分较高</strong>（病变非常复杂，或伴有左主干、多支病变、LVEF降低等高风险特征）→ 推荐血运重建，搭桥通常是更好的选择</div>
    </div>
    <p className="text-[13px] text-[#5D7058] mt-2">具体评分由医生根据您的造影结果计算，您不需要自己算。了解这个概念即可，到时候问医生"我的血管复杂程度怎么样"就好。</p>
    <p className="fn">SYNTAX评分（Sianos et al. EuroIntervention 2005）· ESC 2024指南推荐</p>
  </Sec>
  <Sec title="研究证据与费用">
    <QA q="搭桥和介入哪个更好？" a="取决于血管条件。对于三支病变+糖尿病（FREEDOM试验：搭桥死亡率显著低于介入）、左主干病变、血管病变复杂程度评分高的患者，搭桥的长期效果更好。对于心功能下降的缺血性心肌病，搭桥可能改善长期生存，但介入未显示同样获益。对于简单病变，介入和搭桥效果类似。"/>
    <Sec title="💰 费用参考"><table className="tbl"><thead><tr><th>项目</th><th>费用范围</th></tr></thead><tbody>
      <tr><td className="font-bold">手术费</td><td>约10,000-20,000元</td></tr>
      <tr><td className="font-bold">麻醉费</td><td>约3,000-5,000元</td></tr>
      <tr><td className="font-bold">体外循环</td><td>约5,000-8,000元</td></tr>
      <tr><td className="font-bold">ICU监护</td><td>约5,000-15,000元/天</td></tr>
      <tr><td className="font-bold">住院费及药费</td><td>约10,000-30,000元</td></tr>
      <tr><td className="font-bold bg-[#E8EFE3]">总费用</td><td className="font-bold bg-[#E8EFE3]">约6-15万元</td></tr>
    </tbody></table><p className="text-[12px] text-[#999] mt-1"><strong>以上费用仅为参考区间，实际费用因地区、医院、具体方案差异较大，请务必入院前咨询您所在医院的医保办。</strong>医保报销比例也因地而异。</p></Sec>
    <p className="fn">FREEDOM（NEJM 2012, 7.5年随访）· STICH 10年随访（NEJM 2016）· EXCEL（NEJM 2019，注：该研究的部分数据解读在学术界存在争议）· NOBLE（Lancet 2020）· Head SJ et al. JACC 2018</p>
  </Sec>
</PageLayout>);

const Cabg3=({go})=>(<PageLayout go={go} title="心脏团队与共同决策" sub="3/3" step={1} onBack={()=>go(P.CABG2)} next={P.EVID} nextText="查看研究证据">
  <Sec title="🏥 心脏团队（Heart Team）" accent>
    <p className="text-[14px]">对于<strong>左主干病变、多支病变合并糖尿病、血管病变复杂程度高</strong>等情况，国际指南要求由心内科医生和心外科医生<strong>共同讨论</strong>（称为"心脏团队"），再给出治疗建议。如果当前医院没有心外科，可考虑到有心外科的医院会诊。</p>
    <p className="text-[14px] mt-2">您可以和医生沟通：<strong>"我的情况是否适合请心内科和心外科医生一起讨论一下？"</strong></p>
    <p className="fn">ESC 2024 · ACC/AHA 2021指南均推荐</p>
  </Sec>
  <Sec title="🤝 共同决策：您可以做什么">

const Pref=({go})=>{const[s,setS]=React.useState(0);const[prefs,setPrefs]=React.useState({});const[famAgree,setFamAgree]=React.useState('');const[famTalk,setFamTalk]=React.useState('');
